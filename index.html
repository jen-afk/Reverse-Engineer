<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REVERSE ENGINEER | AI-Powered Code Analysis</title>
    <meta name="description" content="Next-gen reverse engineering tool for GitHub repositories using advanced AI models.">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Markdown Renderer -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <link rel="stylesheet" href="styles.css">
</head>
<body class="dark-theme">
    <div class="background-effects">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
        <div class="grid-line"></div>
    </div>

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <i class="fas fa-microchip neon-text"></i>
                <span class="logo-text">REVERSE<span class="neon-text">ENGINEER</span></span>
            </div>
            <div class="nav-status">
                <span id="server-status-badge" class="badge status-offline">
                    <span class="dot"></span> SERVER OFFLINE
                </span>
            </div>
        </div>
    </nav>

    <main class="dashboard">
        <!-- Input Section -->
        <section class="section-input">
            <div class="glass-card bento-input">
                <header class="card-header">
                    <h3><i class="fas fa-terminal"></i> Command Center</h3>
                    <span class="step-tag">Step 1</span>
                </header>
                
                <form id="prompt-form" class="engineering-form">
                    <div class="input-group">
                        <label for="github-url"><i class="fab fa-github"></i> GitHub URL</label>
                        <input type="url" id="github-url" placeholder="https://github.com/owner/repo/blob/branch/path..." required>
                    </div>

                    <div class="form-row">
                        <div class="input-group">
                            <label for="provider"><i class="fas fa-brain"></i> AI Provider</label>
                            <select id="provider"></select>
                        </div>
                        <div class="input-group">
                            <label for="model"><i class="fas fa-robot"></i> Model ID</label>
                            <input type="text" id="model" placeholder="Default model...">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="input-group">
                            <label for="output-style"><i class="fas fa-palette"></i> Style</label>
                            <select id="output-style">
                                <option value="summary">Summary</option>
                                <option value="deep">Deep Architecture</option>
                                <option value="step-by-step">Step-by-step</option>
                                <option value="refactor">Refactor Insight</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="language"><i class="fas fa-language"></i> Language</label>
                            <select id="language">
                                <option value="Thai">Thai</option>
                                <option value="English">English</option>
                                <option value="Bilingual">Bilingual</option>
                            </select>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="goal"><i class="fas fa-bullseye"></i> Analysis Goal</label>
                        <input type="text" id="goal" placeholder="What do you want to find out? (optional)">
                    </div>

                    <div class="input-group">
                        <label for="extra-context"><i class="fas fa-plus-circle"></i> Extra Context</label>
                        <textarea id="extra-context" rows="3" placeholder="Additional details to guide the AI..."></textarea>
                    </div>

                    <div class="button-stack">
                        <button type="submit" class="btn-primary">
                            <i class="fas fa-rocket"></i> ANALYZE REPOSITORY
                        </button>
                        <div class="btn-secondary-row">
                            <button type="button" id="inspect-btn" class="btn-secondary">
                                <i class="fas fa-search"></i> Inspect Only
                            </button>
                            <button type="button" id="sample-btn" class="btn-secondary">
                                <i class="fas fa-vial"></i> Example
                            </button>
                        </div>
                    </div>
                </form>
            </div>

            <div class="glass-card bento-status">
                <header class="card-header">
                    <h3><i class="fas fa-stream"></i> Event Stream</h3>
                </header>
                <div id="status-container" class="status-log">
                    <p class="log-entry system">> Welcome. Awaiting instructions...</p>
                </div>
            </div>
        </section>

        <!-- Output Section -->
        <section class="section-results">
            <!-- Metadata Card -->
            <div class="glass-card bento-meta">
                <header class="card-header">
                    <h3><i class="fas fa-info-circle"></i> Metadata</h3>
                    <button class="btn-icon" id="copy-meta-btn" title="Copy Metadata"><i class="far fa-copy"></i></button>
                </header>
                <div id="metadata" class="meta-grid-new">
                    <div class="meta-item"><small>Owner</small><span id="meta-owner">-</span></div>
                    <div class="meta-item"><small>Repo</small><span id="meta-repo">-</span></div>
                    <div class="meta-item"><small>Branch</small><span id="meta-branch">-</span></div>
                    <div class="meta-item"><small>Type</small><span id="meta-type">-</span></div>
                    <div class="meta-item full"><small>Full Path</small><span id="meta-path">-</span></div>
                </div>
            </div>

            <!-- Context Card -->
            <div class="glass-card bento-context">
                <header class="card-header">
                    <h3><i class="fas fa-folder-open"></i> Collected context</h3>
                    <div class="header-actions">
                        <span id="context-info" class="badge-outline">0 B</span>
                        <button class="btn-icon" id="copy-context-btn" title="Copy Context"><i class="far fa-copy"></i></button>
                    </div>
                </header>
                <div class="code-viewer">
                    <textarea id="context-output" readonly placeholder="Parsed repository data will appear here..."></textarea>
                </div>
            </div>

            <!-- Analysis Card -->
            <div class="glass-card bento-analysis">
                <header class="card-header">
                    <h3 class="highlight"><i class="fas fa-magic"></i> AI Insight Result</h3>
                    <button class="btn-icon primary" id="copy-analysis-btn" title="Copy Analysis"><i class="far fa-copy"></i></button>
                </header>
                <div class="analysis-result-container">
                    <div id="analysis-output" class="markdown-body">
                        <p class="placeholder-text">Waiting for AI synthesis...</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2026 REVERSE ENGINEER | v2.0 Cinematic Edition</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
